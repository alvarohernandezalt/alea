<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1040" width="1920" height="1040">
  <style>
    text { font-family: "Consolas", "Courier New", monospace; fill: #333; }
    .dim { font-size: 9px; fill: #666; }
    .label { font-size: 11px; fill: #111; font-weight: bold; }
    .sublabel { font-size: 8px; fill: #555; }
    .zone { fill: none; stroke: #333; stroke-width: 1; stroke-dasharray: 4,3; }
    .solid { fill: none; stroke: #111; stroke-width: 1.5; }
    .arrow { stroke: #c00; stroke-width: 0.8; fill: none; marker-end: url(#arrowEnd); marker-start: url(#arrowStart); }
    .arrowR { stroke: #c00; stroke-width: 0.8; fill: none; marker-end: url(#arrowEnd); }
    .dimline { stroke: #c00; stroke-width: 0.5; stroke-dasharray: 2,2; }
    .dimtext { font-size: 8px; fill: #c00; font-weight: bold; }
  </style>
  <defs>
    <marker id="arrowEnd" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#c00" stroke-width="0.8"/>
    </marker>
    <marker id="arrowStart" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6" fill="none" stroke="#c00" stroke-width="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1040" fill="white"/>

  <!-- ============================================ -->
  <!-- MAIN WINDOW OUTLINE -->
  <!-- ============================================ -->
  <rect x="0" y="0" width="1920" height="1040" class="solid"/>

  <!-- Overall dimension labels -->
  <text x="960" y="15" text-anchor="middle" class="dimtext">1920px (pantalla completa)</text>
  <line x1="0" y1="8" x2="1920" y2="8" class="arrow"/>

  <text x="1935" y="520" text-anchor="start" class="dimtext" transform="rotate(90,1935,520)">1040px (sin taskbar)</text>
  <line x1="1912" y1="0" x2="1912" y2="1040" class="arrow"/>

  <!-- ============================================ -->
  <!-- MENU BAR -->
  <!-- ============================================ -->
  <rect x="0" y="0" width="1920" height="30" class="zone"/>
  <text x="960" y="19" text-anchor="middle" class="label">MENU BAR</text>
  <text x="10" y="19" class="sublabel">File | Composition</text>
  <text x="1800" y="19" class="dim">h: 30px</text>

  <!-- ============================================ -->
  <!-- HORIZONTAL SPLIT LINE (Sources | Tabs) -->
  <!-- ============================================ -->
  <!-- Sources panel -->
  <rect x="0" y="30" width="300" height="575" class="zone"/>
  <!-- Splitter handle -->
  <rect x="300" y="30" width="3" height="575" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <!-- Tabs panel -->
  <rect x="303" y="30" width="1617" height="575" class="zone"/>

  <!-- Source panel width arrows -->
  <line x1="0" y1="620" x2="300" y2="620" class="arrow"/>
  <text x="150" y="618" text-anchor="middle" class="dimtext">300px (init) min:280 max:400</text>

  <!-- Tabs panel width -->
  <line x1="303" y1="620" x2="1920" y2="620" class="arrow"/>
  <text x="1110" y="618" text-anchor="middle" class="dimtext">~1617px (resto)</text>

  <!-- Splitter handle label -->
  <text x="310" y="320" class="dimtext" transform="rotate(90,310,320)">splitter 3px</text>

  <!-- Upper zone height -->
  <line x1="1895" y1="30" x2="1895" y2="605" class="arrow"/>
  <text x="1890" y="320" text-anchor="end" class="dimtext">~575px</text>

  <!-- ============================================ -->
  <!-- SOURCES PANEL DETAIL -->
  <!-- ============================================ -->
  <text x="150" y="50" text-anchor="middle" class="label">SOURCES</text>
  <text x="10" y="65" class="dim">margins: 4,4,4,4</text>

  <!-- Header -->
  <rect x="4" y="70" width="292" height="20" class="zone"/>
  <text x="10" y="84" class="sublabel">"SOURCES" 14px bold</text>

  <!-- File list -->
  <rect x="4" y="94" width="292" height="120" class="zone"/>
  <text x="150" y="130" text-anchor="middle" class="sublabel">QListWidget</text>
  <text x="150" y="145" text-anchor="middle" class="dim">min-h: 100px</text>

  <!-- Source item detail -->
  <rect x="10" y="100" width="280" height="55" class="zone" stroke="#888"/>
  <text x="15" y="112" class="dim">SourceItem: margins 4,4,4,4 spacing 2</text>
  <text x="15" y="122" class="dim">name: 12px bold | info: 11px</text>

  <!-- Waveform mini -->
  <rect x="10" y="125" width="280" height="20" class="zone" stroke="#888"/>
  <text x="15" y="138" class="dim">waveform: h=35px fijo</text>

  <!-- Weights section -->
  <rect x="4" y="220" width="292" height="130" class="zone"/>
  <text x="10" y="235" class="sublabel">"Weights" 11px bold, margin-top: 8px</text>
  <text x="10" y="248" class="dim">scroll area max-h: 150px</text>

  <!-- Weight row detail -->
  <rect x="10" y="255" width="280" height="24" class="zone" stroke="#888"/>
  <text x="15" y="270" class="dim">label 90px | slider (flex) | val 35px — font 11px</text>

  <rect x="10" y="282" width="280" height="24" class="zone" stroke="#888"/>
  <text x="15" y="297" class="dim">label 90px | slider (flex) | val 35px</text>

  <!-- ============================================ -->
  <!-- TABS PANEL DETAIL -->
  <!-- ============================================ -->

  <!-- Tab bar -->
  <rect x="303" y="30" width="1617" height="35" class="zone"/>
  <text x="320" y="52" class="sublabel">Composition</text>
  <text x="440" y="52" class="sublabel">Effects Palette</text>
  <text x="1800" y="52" class="dim">tab padding: 8px 18px, radius 4px top, margin-r 2px</text>

  <!-- Tab content area -->
  <rect x="303" y="65" width="1617" height="540" class="zone"/>
  <text x="1110" y="82" text-anchor="middle" class="label">TAB CONTENT</text>
  <text x="310" y="95" class="dim">spacing: 8px entre GroupBoxes</text>

  <!-- GroupBox example: Constraints -->
  <rect x="315" y="100" width="780" height="250" class="zone" stroke="#999" rx="6"/>
  <text x="325" y="115" class="sublabel">QGroupBox "Constraints" — radius 6px, margin-top 10px, padding-top 18px</text>

  <!-- RangeSlider detail -->
  <rect x="325" y="130" width="760" height="36" class="zone" stroke="#aaa"/>
  <text x="330" y="142" class="dim">RangeSlider h=36px fijo</text>
  <!-- Label area -->
  <rect x="325" y="130" width="125" height="36" fill="#f8f8ff" stroke="#ccc" stroke-width="0.5"/>
  <text x="330" y="153" class="dim">label 125px</text>
  <!-- Track -->
  <line x1="455" y1="148" x2="1025" y2="148" stroke="#aaa" stroke-width="2"/>
  <text x="740" y="142" text-anchor="middle" class="dim">track: desde 130px hasta w-60px</text>
  <!-- Handles -->
  <circle cx="550" cy="148" r="7" fill="none" stroke="#999"/>
  <circle cx="900" cy="148" r="7" fill="none" stroke="#999"/>
  <text x="550" y="165" text-anchor="middle" class="dim">handle r=7 (d=14)</text>
  <!-- Value -->
  <rect x="1030" y="130" width="55" height="36" fill="#f8f8ff" stroke="#ccc" stroke-width="0.5"/>
  <text x="1035" y="153" class="dim">val 55px</text>

  <!-- More RangeSliders -->
  <rect x="325" y="172" width="760" height="36" class="zone" stroke="#aaa"/>
  <text x="330" y="194" class="dim">RangeSlider h=36px (silence gap)</text>

  <rect x="325" y="214" width="760" height="36" class="zone" stroke="#aaa"/>
  <text x="330" y="236" class="dim">RangeSlider h=36px (amplitude)</text>

  <rect x="325" y="256" width="760" height="36" class="zone" stroke="#aaa"/>
  <text x="330" y="278" class="dim">RangeSlider h=36px (pan)</text>

  <rect x="325" y="298" width="760" height="36" class="zone" stroke="#aaa"/>
  <text x="330" y="320" class="dim">RangeSlider h=36px (fade-in)</text>

  <!-- LabeledSlider example -->
  <rect x="315" y="360" width="780" height="30" class="zone" stroke="#aaa"/>
  <rect x="325" y="362" width="120" height="26" fill="#f8f8ff" stroke="#ccc" stroke-width="0.5"/>
  <text x="330" y="379" class="dim">label 120px</text>
  <text x="455" y="379" class="dim">QSlider (stretch) — 1000 pasos internos</text>
  <rect x="1015" y="362" width="70" height="26" fill="#f8f8ff" stroke="#ccc" stroke-width="0.5"/>
  <text x="1020" y="379" class="dim">val 70px</text>

  <!-- DensityCurvePreview -->
  <rect x="315" y="400" width="780" height="70" class="zone" stroke="#999"/>
  <text x="325" y="418" class="sublabel">DensityCurvePreview</text>
  <text x="325" y="432" class="dim">h=70px fijo, min-w=180px</text>
  <text x="325" y="446" class="dim">margin=8px, 100 puntos, trazo 2px, escala 0.45x</text>
  <text x="325" y="460" class="dim">label: 8pt, grid: punteado 1px #333355</text>

  <!-- Compose/Reroll buttons -->
  <rect x="315" y="480" width="380" height="36" class="zone" stroke="#999"/>
  <text x="505" y="502" text-anchor="middle" class="sublabel">COMPOSE — min-h: 36px</text>

  <rect x="710" y="480" width="380" height="36" class="zone" stroke="#999"/>
  <text x="900" y="502" text-anchor="middle" class="sublabel">RE-ROLL — min-h: 36px</text>

  <!-- Seed -->
  <rect x="315" y="525" width="200" height="30" class="zone" stroke="#aaa"/>
  <text x="325" y="544" class="dim">Seed input + Random btn (w=70px)</text>

  <!-- ============================================ -->
  <!-- VERTICAL SPLITTER -->
  <!-- ============================================ -->
  <rect x="0" y="605" width="1920" height="3" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <text x="960" y="603" text-anchor="middle" class="dimtext">splitter vertical 3px</text>

  <!-- ============================================ -->
  <!-- TIMELINE -->
  <!-- ============================================ -->
  <rect x="0" y="608" width="1920" height="370" class="zone"/>
  <text x="960" y="628" text-anchor="middle" class="label">TIMELINE</text>

  <!-- Lower zone height -->
  <line x1="1895" y1="608" x2="1895" y2="978" class="arrow"/>
  <text x="1890" y="793" text-anchor="end" class="dimtext">~370px</text>

  <!-- Mixer column -->
  <rect x="0" y="608" width="85" height="370" class="zone"/>
  <text x="42" y="640" text-anchor="middle" class="sublabel">MIXER</text>
  <text x="42" y="655" text-anchor="middle" class="dim">w=85px</text>

  <!-- Mixer strip detail -->
  <rect x="2" y="660" width="80" height="180" class="zone" stroke="#999"/>
  <text x="6" y="675" class="dim">MixerStrip w=80</text>
  <text x="6" y="688" class="dim">margins 2,4,2,4</text>
  <text x="6" y="701" class="dim">spacing 3px</text>

  <!-- Track name -->
  <rect x="6" y="705" width="72" height="14" class="zone" stroke="#aaa"/>
  <text x="10" y="715" class="dim">name 11px bold</text>

  <!-- M/S buttons -->
  <rect x="6" y="722" width="30" height="22" class="zone" stroke="#aaa"/>
  <text x="10" y="737" class="dim">M</text>
  <text x="20" y="750" class="dim">30x22</text>
  <rect x="40" y="722" width="30" height="22" class="zone" stroke="#aaa"/>
  <text x="44" y="737" class="dim">S</text>

  <!-- Volume slider -->
  <rect x="20" y="750" width="20" height="60" class="zone" stroke="#aaa"/>
  <text x="45" y="785" class="dim">Vol h=60</text>

  <!-- Pan slider -->
  <rect x="6" y="815" width="72" height="16" class="zone" stroke="#aaa"/>
  <text x="10" y="827" class="dim">Pan</text>

  <!-- Canvas area -->
  <rect x="85" y="608" width="1835" height="370" class="zone"/>

  <!-- Ruler -->
  <rect x="85" y="608" width="1835" height="20" class="zone" stroke="#999"/>
  <text x="960" y="622" text-anchor="middle" class="dim">RULER h=20px — font 9pt — ticks 4px</text>

  <!-- Track 1 -->
  <rect x="85" y="628" width="1835" height="55" class="zone" stroke="#aaa"/>
  <text x="95" y="645" class="dim">TRACK 1 — h=55px</text>
  <!-- Event block -->
  <rect x="200" y="631" width="300" height="49" rx="2" fill="none" stroke="#999" stroke-dasharray="3,2"/>
  <text x="210" y="650" class="dim">evento h=49px (track-6)</text>
  <text x="210" y="663" class="dim">offset 3px top, label 8pt</text>
  <text x="210" y="676" class="dim">padding: 3,2,6,4px</text>

  <!-- Track 2 -->
  <rect x="85" y="683" width="1835" height="55" class="zone" stroke="#aaa"/>
  <text x="95" y="700" class="dim">TRACK 2 — h=55px (alterno #2a2a3e)</text>
  <rect x="400" y="686" width="500" height="49" rx="2" fill="none" stroke="#999" stroke-dasharray="3,2"/>

  <!-- Track 3 -->
  <rect x="85" y="738" width="1835" height="55" class="zone" stroke="#aaa"/>
  <text x="95" y="755" class="dim">TRACK 3 — h=55px</text>

  <!-- Track 4 -->
  <rect x="85" y="793" width="1835" height="55" class="zone" stroke="#aaa"/>
  <text x="95" y="810" class="dim">TRACK 4 — h=55px</text>

  <!-- Track separator labels -->
  <text x="1800" y="682" class="dim">separador 1px</text>

  <!-- Track height arrow -->
  <line x1="1870" y1="628" x2="1870" y2="683" class="arrow"/>
  <text x="1875" y="658" class="dimtext">55px</text>

  <!-- Event height arrow -->
  <line x1="510" y1="631" x2="510" y2="680" class="arrow"/>
  <text x="515" y="660" class="dimtext">49px</text>

  <!-- Mixer width arrow -->
  <line x1="0" y1="975" x2="85" y2="975" class="arrow"/>
  <text x="42" y="973" text-anchor="middle" class="dimtext">85px</text>

  <!-- Stats bar -->
  <rect x="0" y="948" width="1920" height="22" class="zone"/>
  <text x="10" y="963" class="dim">STATS BAR — padding 4px 8px, border-top 1px solid #3a3a55</text>

  <!-- ============================================ -->
  <!-- TRANSPORT BAR -->
  <!-- ============================================ -->
  <rect x="0" y="978" width="1920" height="62" class="zone"/>
  <text x="960" y="998" text-anchor="middle" class="label">TRANSPORT BAR</text>
  <text x="10" y="1012" class="dim">margins: 8,4,8,4 — bg: #252536 — border-top: 1px #3a3a55</text>

  <!-- Render button -->
  <rect x="16" y="1005" width="120" height="32" class="zone" stroke="#999"/>
  <text x="76" y="1025" text-anchor="middle" class="dim">Render h=32</text>

  <!-- Progress bar -->
  <rect x="150" y="1010" width="1200" height="22" class="zone" stroke="#999"/>
  <text x="750" y="1025" text-anchor="middle" class="dim">ProgressBar h=22px fijo</text>

  <!-- Export buttons -->
  <rect x="1370" y="1005" width="120" height="32" class="zone" stroke="#999"/>
  <text x="1430" y="1025" text-anchor="middle" class="dim">Export WAV</text>
  <rect x="1500" y="1005" width="120" height="32" class="zone" stroke="#999"/>
  <text x="1560" y="1025" text-anchor="middle" class="dim">Export MP3</text>

  <!-- Copyright -->
  <text x="1800" y="1035" class="dim">copyright 11px, padding 4px</text>

  <!-- ============================================ -->
  <!-- ZOOM DETAIL BOX: Standard QSlider -->
  <!-- ============================================ -->
  <rect x="1200" y="100" width="350" height="120" fill="white" stroke="#333" stroke-width="1"/>
  <text x="1375" y="118" text-anchor="middle" class="label">QSlider (horizontal) detalle</text>
  <text x="1210" y="135" class="dim">groove: h=4px, radius 2px</text>
  <text x="1210" y="150" class="dim">handle: 14x14px, radius 7px (circular)</text>
  <text x="1210" y="165" class="dim">handle margin: -5px 0</text>
  <text x="1210" y="180" class="dim">sub-page: radius 2px</text>
  <!-- Visual -->
  <line x1="1220" y1="198" x2="1530" y2="198" stroke="#ccc" stroke-width="4"/>
  <line x1="1220" y1="198" x2="1350" y2="198" stroke="#999" stroke-width="4"/>
  <circle cx="1350" cy="198" r="7" fill="none" stroke="#333"/>
  <text x="1360" y="212" class="dim">r=7</text>

  <!-- ============================================ -->
  <!-- ZOOM DETAIL BOX: QCheckBox -->
  <!-- ============================================ -->
  <rect x="1200" y="230" width="350" height="60" fill="white" stroke="#333" stroke-width="1"/>
  <text x="1375" y="248" text-anchor="middle" class="label">QCheckBox detalle</text>
  <text x="1210" y="265" class="dim">indicator: 16x16px, radius 3px, spacing 8px</text>
  <rect x="1210" y="270" width="16" height="16" fill="none" stroke="#999" rx="3"/>
  <text x="1235" y="282" class="dim">16x16</text>

  <!-- ============================================ -->
  <!-- ZOOM DETAIL BOX: QComboBox -->
  <!-- ============================================ -->
  <rect x="1200" y="300" width="350" height="60" fill="white" stroke="#333" stroke-width="1"/>
  <text x="1375" y="318" text-anchor="middle" class="label">QComboBox detalle</text>
  <text x="1210" y="335" class="dim">min-h: 24px, padding 4px 8px, radius 4px</text>
  <text x="1210" y="350" class="dim">drop-down width: 24px</text>

  <!-- ============================================ -->
  <!-- ZOOM DETAIL BOX: QScrollBar -->
  <!-- ============================================ -->
  <rect x="1200" y="370" width="350" height="50" fill="white" stroke="#333" stroke-width="1"/>
  <text x="1375" y="388" text-anchor="middle" class="label">QScrollBar (vertical) detalle</text>
  <text x="1210" y="405" class="dim">width: 10px, handle min-h: 30px, radius 5px</text>

  <!-- ============================================ -->
  <!-- ZOOM DETAIL BOX: QProgressBar -->
  <!-- ============================================ -->
  <rect x="1200" y="430" width="350" height="50" fill="white" stroke="#333" stroke-width="1"/>
  <text x="1375" y="448" text-anchor="middle" class="label">QProgressBar detalle</text>
  <text x="1210" y="465" class="dim">min-h: 18px, radius 4px, chunk radius 3px</text>

  <!-- ============================================ -->
  <!-- ZOOM DETAIL BOX: QPushButton -->
  <!-- ============================================ -->
  <rect x="1200" y="490" width="350" height="50" fill="white" stroke="#333" stroke-width="1"/>
  <text x="1375" y="508" text-anchor="middle" class="label">QPushButton detalle</text>
  <text x="1210" y="525" class="dim">min-h: 24px, padding 6px 14px, radius 4px</text>

</svg>